<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Divulgación de Afiliados — Compara Tu Envío</title>
  <meta name="description" content="Divulgación de afiliados de Compara Tu Envío. Transparencia sobre comisiones, recomendaciones y contenido patrocinado.">
  <link rel="canonical" href="https://comparatuenvio.com/affiliate-disclosure.html">
  <style>
    :root {
      --green: #1D9E75;
      --green-deep: #085041;
      --gray-900: #212529;
      --gray-700: #495057;
      --gray-600: #6C757D;
      --gray-200: #E9ECEF;
      --gray-100: #F8F9FA;
      --font: 'DM Sans', -apple-system, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: var(--font); color: var(--gray-900); background: var(--gray-100); line-height: 1.75; }
    .nav-header {
      background: #fff;
      padding: 14px 18px;
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 30;
    }
    .back-link { font-weight: 600; color: var(--green); text-decoration: none; font-size: 14px; }
    .lang-toggle { display: inline-flex; border: 1px solid var(--gray-200); border-radius: 999px; overflow: hidden; }
    .lang-btn { border: 0; background: #fff; padding: 5px 10px; font-size: 12px; font-weight: 600; color: var(--gray-700); cursor: pointer; }
    .lang-btn.active { background: var(--green); color: #fff; }
    .container {
      max-width: 860px;
      margin: 30px auto;
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.04);
      padding: 30px 24px;
    }
    h1 { color: var(--green-deep); margin: 0 0 14px; font-size: 32px; }
    h2 { margin: 24px 0 8px; font-size: 20px; }
    p { margin: 0 0 14px; font-size: 16px; color: var(--gray-700); }
    .note {
      background: #f0fdf7;
      border-left: 4px solid var(--green);
      border-radius: 10px;
      padding: 14px 16px;
      margin: 18px 0 8px;
      color: var(--gray-900);
      font-size: 15px;
    }
    a { color: var(--green); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .footer { margin: 18px 0 36px; text-align: center; color: var(--gray-600); font-size: 13px; }
  </style>
</head>
<body>
  <header class="nav-header">
    <a href="index.html" class="back-link" id="linkBack">← Volver al inicio</a>
    <div class="lang-toggle">
      <button onclick="setLang('es')" id="btnES" class="lang-btn">ES</button>
      <button onclick="setLang('en')" id="btnEN" class="lang-btn">EN</button>
    </div>
  </header>

  <main class="container">
    <h1 id="title">Divulgación de Afiliados</h1>
    <div id="bodyText"></div>
  </main>

  <div class="footer">© 2026 Compara Tu Envío</div>

  <script>
    const T = {
      es: {
        title: 'Divulgación de Afiliados',
        linkBack: '← Volver al inicio',
        body: `
          <p>En Compara Tu Envío creemos en la transparencia total con nuestra comunidad.</p>
          <p>Algunos enlaces en este sitio son enlaces de afiliado. Esto significa que, si haces clic y utilizas ciertos proveedores, podemos recibir una comisión sin costo adicional para ti.</p>
          <div class="note"><strong>Importante:</strong> nuestras recomendaciones se basan en criterios editoriales y comparaciones estimadas. La comisión potencial no cambia nuestro compromiso de ayudarte a tomar mejores decisiones para tu familia.</div>
          <h2>Cómo usamos estas comisiones</h2>
          <p>Las comisiones nos ayudan a mantener el sitio, publicar guías gratuitas, mejorar herramientas y actualizar información para la comunidad latina en Estados Unidos.</p>
          <h2>Tu decisión siempre es tuya</h2>
          <p>Siempre te recomendamos comparar y verificar el monto final directamente en el proveedor antes de enviar dinero.</p>
          <h2>Contacto</h2>
          <p>Si tienes preguntas sobre esta política de afiliados, escríbenos a <a href="mailto:help@comparatuenvio.com">help@comparatuenvio.com</a>.</p>
        `
      },
      en: {
        title: 'Affiliate Disclosure',
        linkBack: '← Back to home',
        body: `
          <p>At Compara Tu Envío, we believe in full transparency with our community.</p>
          <p>Some links on this website are affiliate links. This means that if you click and use certain providers, we may earn a commission at no extra cost to you.</p>
          <div class="note"><strong>Important:</strong> our recommendations are based on editorial criteria and estimated comparisons. Potential commissions do not change our commitment to helping you make better decisions for your family.</div>
          <h2>How we use these commissions</h2>
          <p>Commissions help us maintain the website, publish free guides, improve tools, and keep information updated for the Latino community in the United States.</p>
          <h2>Your decision is always yours</h2>
          <p>We always recommend comparing and verifying final payout directly on the provider website before sending money.</p>
          <h2>Contact</h2>
          <p>If you have questions about this affiliate policy, email us at <a href="mailto:help@comparatuenvio.com">help@comparatuenvio.com</a>.</p>
        `
      }
    };

    function setLang(lang) {
      localStorage.setItem('prefLang', lang);
      document.getElementById('btnES').className = 'lang-btn' + (lang === 'es' ? ' active' : '');
      document.getElementById('btnEN').className = 'lang-btn' + (lang === 'en' ? ' active' : '');
      document.getElementById('title').textContent = T[lang].title;
      document.getElementById('linkBack').textContent = T[lang].linkBack;
      document.getElementById('bodyText').innerHTML = T[lang].body;
      document.title = T[lang].title + ' — Compara Tu Envío';
      document.documentElement.lang = lang;
    }

    setLang(localStorage.getItem('prefLang') || 'es');
  </script>
</body>
</html>
