<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Política de Privacidad — Compara Tu Envío</title>
  <meta name="description" content="Política de privacidad de Compara Tu Envío: datos que recopilamos, cómo los usamos, cookies y derechos de privacidad.">
  <link rel="canonical" href="https://comparatuenvio.com/privacy.html">
  <style>
    :root {
      --green: #1D9E75;
      --green-deep: #085041;
      --gray-900: #212529;
      --gray-700: #495057;
      --gray-600: #6C757D;
      --gray-200: #E9ECEF;
      --gray-100: #F8F9FA;
      --font: 'DM Sans', -apple-system, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: var(--font); color: var(--gray-900); background: var(--gray-100); line-height: 1.75; }
    .nav-header {
      background: #fff;
      padding: 14px 18px;
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 30;
    }
    .back-link { font-weight: 600; color: var(--green); text-decoration: none; font-size: 14px; }
    .lang-toggle { display: inline-flex; border: 1px solid var(--gray-200); border-radius: 999px; overflow: hidden; }
    .lang-btn { border: 0; background: #fff; padding: 5px 10px; font-size: 12px; font-weight: 600; color: var(--gray-700); cursor: pointer; }
    .lang-btn.active { background: var(--green); color: #fff; }
    .container {
      max-width: 900px;
      margin: 30px auto;
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.04);
      padding: 30px 24px;
    }
    h1 { color: var(--green-deep); margin: 0 0 14px; font-size: 32px; }
    h2 { margin: 22px 0 8px; font-size: 20px; }
    p, li { margin: 0 0 12px; font-size: 16px; color: var(--gray-700); }
    ul { margin: 0 0 0 20px; }
    .note {
      background: #f0fdf7;
      border-left: 4px solid var(--green);
      border-radius: 10px;
      padding: 14px 16px;
      margin: 16px 0;
      color: var(--gray-900);
      font-size: 15px;
    }
    .footer { margin: 18px 0 36px; text-align: center; color: var(--gray-600); font-size: 13px; }
    a { color: var(--green); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header class="nav-header">
    <a href="index.html" class="back-link" id="linkBack">← Volver al inicio</a>
    <div class="lang-toggle">
      <button onclick="setLang('es')" id="btnES" class="lang-btn">ES</button>
      <button onclick="setLang('en')" id="btnEN" class="lang-btn">EN</button>
    </div>
  </header>

  <main class="container">
    <h1 id="title">Política de Privacidad</h1>
    <div id="bodyText"></div>
  </main>
  <div class="footer">© 2026 Compara Tu Envío</div>

  <script>
    const T = {
      es: {
        title: 'Política de Privacidad',
        linkBack: '← Volver al inicio',
        body: `
          <p>En Compara Tu Envío respetamos tu privacidad y nos comprometemos a proteger tus datos personales.</p>
          <h2>1. Información que recopilamos</h2>
          <ul>
            <li>Datos técnicos básicos (navegador, dispositivo, páginas visitadas).</li>
            <li>Datos de uso para análisis estadístico y mejora del sitio.</li>
            <li>Si nos escribes por correo, recopilamos la información que envías voluntariamente.</li>
          </ul>
          <h2>2. Cómo usamos la información</h2>
          <ul>
            <li>Mejorar rendimiento, experiencia y contenido del sitio.</li>
            <li>Entender tendencias de uso de forma agregada.</li>
            <li>Responder consultas de soporte o contacto.</li>
          </ul>
          <h2>3. Cookies y tecnologías similares</h2>
          <p>Podemos usar cookies para recordar preferencias (por ejemplo idioma) y para análisis de tráfico. También pueden existir cookies de terceros relacionadas con analítica o publicidad.</p>
          <div class="note"><strong>Importante:</strong> puedes desactivar cookies desde tu navegador, aunque algunas funciones del sitio podrían verse limitadas.</div>
          <h2>4. Publicidad y afiliados</h2>
          <p>Este sitio puede mostrar anuncios y enlaces de afiliados. Estos servicios pueden usar cookies o identificadores para medir rendimiento y personalizar experiencias.</p>
          <h2>5. Tus derechos</h2>
          <p>Dependiendo de tu jurisdicción, puedes solicitar acceso, corrección o eliminación de datos personales compartidos con nosotros por correo electrónico.</p>
          <h2>6. Contacto</h2>
          <p>Para preguntas sobre esta política o solicitudes de privacidad, escríbenos a <a href="mailto:help@comparatuenvio.com">help@comparatuenvio.com</a>.</p>
          <h2>7. Cambios a esta política</h2>
          <p>Podemos actualizar esta política cuando sea necesario. Publicaremos la versión más reciente en esta página.</p>
        `
      },
      en: {
        title: 'Privacy Policy',
        linkBack: '← Back to home',
        body: `
          <p>At Compara Tu Envío, we respect your privacy and are committed to protecting your personal data.</p>
          <h2>1. Information we collect</h2>
          <ul>
            <li>Basic technical data (browser, device, pages visited).</li>
            <li>Usage data for analytics and website improvement.</li>
            <li>If you contact us by email, we collect the information you voluntarily provide.</li>
          </ul>
          <h2>2. How we use information</h2>
          <ul>
            <li>Improve website performance, experience, and content.</li>
            <li>Understand usage trends in aggregated form.</li>
            <li>Respond to support or contact requests.</li>
          </ul>
          <h2>3. Cookies and similar technologies</h2>
          <p>We may use cookies to remember preferences (such as language) and for traffic analytics. Third-party analytics or advertising services may also use cookies.</p>
          <div class="note"><strong>Important:</strong> you can disable cookies in your browser, but some website features may be limited.</div>
          <h2>4. Advertising and affiliates</h2>
          <p>This website may display ads and affiliate links. These services may use cookies or identifiers to measure performance and personalize experiences.</p>
          <h2>5. Your rights</h2>
          <p>Depending on your jurisdiction, you may request access, correction, or deletion of personal data shared with us by email.</p>
          <h2>6. Contact</h2>
          <p>For privacy questions or requests, email us at <a href="mailto:help@comparatuenvio.com">help@comparatuenvio.com</a>.</p>
          <h2>7. Changes to this policy</h2>
          <p>We may update this policy when needed. The latest version will always be published on this page.</p>
        `
      }
    };

    function setLang(lang) {
      localStorage.setItem('prefLang', lang);
      document.getElementById('btnES').className = 'lang-btn' + (lang === 'es' ? ' active' : '');
      document.getElementById('btnEN').className = 'lang-btn' + (lang === 'en' ? ' active' : '');
      document.getElementById('title').textContent = T[lang].title;
      document.getElementById('linkBack').textContent = T[lang].linkBack;
      document.getElementById('bodyText').innerHTML = T[lang].body;
      document.title = T[lang].title + ' — Compara Tu Envío';
      document.documentElement.lang = lang;
    }

    setLang(localStorage.getItem('prefLang') || 'es');
  </script>
</body>
</html>
