<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Términos de Servicio — Compara Tu Envío</title>
  <meta name="description" content="Términos de servicio de Compara Tu Envío. Uso del sitio, responsabilidades, exención de asesoría financiera y limitación de responsabilidad.">
  <link rel="canonical" href="https://comparatuenvio.com/terms.html">
  <style>
    :root {
      --green: #1D9E75;
      --green-deep: #085041;
      --gray-900: #212529;
      --gray-700: #495057;
      --gray-600: #6C757D;
      --gray-200: #E9ECEF;
      --gray-100: #F8F9FA;
      --font: 'DM Sans', -apple-system, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: var(--font); color: var(--gray-900); background: var(--gray-100); line-height: 1.75; }
    .nav-header {
      background: #fff;
      padding: 14px 18px;
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 30;
    }
    .back-link { font-weight: 600; color: var(--green); text-decoration: none; font-size: 14px; }
    .lang-toggle { display: inline-flex; border: 1px solid var(--gray-200); border-radius: 999px; overflow: hidden; }
    .lang-btn { border: 0; background: #fff; padding: 5px 10px; font-size: 12px; font-weight: 600; color: var(--gray-700); cursor: pointer; }
    .lang-btn.active { background: var(--green); color: #fff; }
    .container {
      max-width: 900px;
      margin: 30px auto;
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.04);
      padding: 30px 24px;
    }
    h1 { color: var(--green-deep); margin: 0 0 14px; font-size: 32px; }
    h2 { margin: 22px 0 8px; font-size: 20px; }
    p, li { margin: 0 0 12px; font-size: 16px; color: var(--gray-700); }
    ul { margin: 0 0 0 20px; }
    .note {
      background: #f0fdf7;
      border-left: 4px solid var(--green);
      border-radius: 10px;
      padding: 14px 16px;
      margin: 16px 0;
      color: var(--gray-900);
      font-size: 15px;
    }
    .footer { margin: 18px 0 36px; text-align: center; color: var(--gray-600); font-size: 13px; }
    a { color: var(--green); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header class="nav-header">
    <a href="index.html" class="back-link" id="linkBack">← Volver al inicio</a>
    <div class="lang-toggle">
      <button onclick="setLang('es')" id="btnES" class="lang-btn">ES</button>
      <button onclick="setLang('en')" id="btnEN" class="lang-btn">EN</button>
    </div>
  </header>

  <main class="container">
    <h1 id="title">Términos de Servicio</h1>
    <div id="bodyText"></div>
  </main>
  <div class="footer">© 2026 Compara Tu Envío</div>

  <script>
    const T = {
      es: {
        title: 'Términos de Servicio',
        linkBack: '← Volver al inicio',
        body: `
          <p>Al usar Compara Tu Envío, aceptas estos términos y condiciones. Si no estás de acuerdo, por favor no uses el sitio.</p>
          <h2>1. Uso informativo</h2>
          <p>El contenido y las comparaciones de este sitio son informativos y educativos. No constituyen asesoría legal, fiscal o financiera personalizada.</p>
          <div class="note"><strong>Importante:</strong> los montos mostrados son estimaciones. Siempre verifica costos, tipo de cambio y monto final directamente con el proveedor antes de enviar dinero.</div>
          <h2>2. Exactitud y disponibilidad</h2>
          <p>Hacemos esfuerzos razonables para mantener información actualizada, pero no garantizamos precisión total, continuidad del servicio o ausencia de errores técnicos.</p>
          <h2>3. Enlaces externos y afiliados</h2>
          <p>Este sitio contiene enlaces a terceros. Podemos recibir comisiones de afiliado cuando el usuario usa ciertos enlaces, sin costo adicional para ti.</p>
          <h2>4. Limitación de responsabilidad</h2>
          <p>Compara Tu Envío no será responsable por pérdidas directas o indirectas derivadas del uso del sitio o de decisiones tomadas con base en la información publicada.</p>
          <h2>5. Cambios a estos términos</h2>
          <p>Podemos actualizar estos términos en cualquier momento. El uso continuo del sitio implica aceptación de la versión vigente.</p>
          <h2>6. Contacto</h2>
          <p>Si tienes dudas sobre estos términos, escríbenos a <a href="mailto:help@comparatuenvio.com">help@comparatuenvio.com</a>.</p>
        `
      },
      en: {
        title: 'Terms of Service',
        linkBack: '← Back to home',
        body: `
          <p>By using Compara Tu Envío, you agree to these terms and conditions. If you do not agree, please do not use the website.</p>
          <h2>1. Informational use</h2>
          <p>The content and comparisons on this site are for informational and educational purposes only. They do not constitute legal, tax, or personalized financial advice.</p>
          <div class="note"><strong>Important:</strong> displayed payouts are estimates. Always verify fees, exchange rate, and final payout directly with the provider before sending money.</div>
          <h2>2. Accuracy and availability</h2>
          <p>We make reasonable efforts to keep information updated, but we do not guarantee perfect accuracy, uninterrupted availability, or absence of technical errors.</p>
          <h2>3. External and affiliate links</h2>
          <p>This site includes third-party links. We may earn affiliate commissions when users choose certain links, at no extra cost to you.</p>
          <h2>4. Limitation of liability</h2>
          <p>Compara Tu Envío is not liable for direct or indirect losses resulting from use of this website or decisions made based on published information.</p>
          <h2>5. Changes to these terms</h2>
          <p>We may update these terms at any time. Continued use of the website means acceptance of the current version.</p>
          <h2>6. Contact</h2>
          <p>If you have questions about these terms, email us at <a href="mailto:help@comparatuenvio.com">help@comparatuenvio.com</a>.</p>
        `
      }
    };

    function setLang(lang) {
      localStorage.setItem('prefLang', lang);
      document.getElementById('btnES').className = 'lang-btn' + (lang === 'es' ? ' active' : '');
      document.getElementById('btnEN').className = 'lang-btn' + (lang === 'en' ? ' active' : '');
      document.getElementById('title').textContent = T[lang].title;
      document.getElementById('linkBack').textContent = T[lang].linkBack;
      document.getElementById('bodyText').innerHTML = T[lang].body;
      document.title = T[lang].title + ' — Compara Tu Envío';
      document.documentElement.lang = lang;
    }

    setLang(localStorage.getItem('prefLang') || 'es');
  </script>
</body>
</html>
